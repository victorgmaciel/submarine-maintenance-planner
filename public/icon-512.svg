<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg512" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow512" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <rect width="512" height="512" rx="96" fill="url(#bg512)"/>
  <!-- Trident centered at (256, 240), scaled up -->
  <g transform="translate(256,236)" fill="#60a5fa" filter="url(#glow512)">
    <!-- Left prong -->
    <path d="M-102 38 L-102 -48 L-86 -92 L-70 -48 L-70 38 Z"/>
