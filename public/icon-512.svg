    <path d="M70 38 L70 -48 L86 -92 L102 -48 L102 38 Z"/>
    <!-- Crossbar -->
    <rect x="-102" y="38" width="204" height="22" rx="8"/>
    <!-- Handle shaft -->
    <rect x="-11" y="54" width="22" height="144" rx="11"/>
    <!-- Crossguard -->
    <rect x="-60" y="140" width="120" height="18" rx="9"/>
    <circle cx="-60" cy="149" r="22"/>
    <circle cx="60"  cy="149" r="22"/>
    <!-- Base foot -->
    <rect x="-32" y="198" width="64" height="18" rx="9"/>
  </g>
</svg>
