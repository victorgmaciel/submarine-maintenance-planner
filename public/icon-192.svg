<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg192" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow192" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="36" fill="#0f172a"/>
  <rect width="192" height="192" rx="36" fill="url(#bg192)"/>
  <!-- Trident centered at (96, 96), scaled up -->
  <g transform="translate(96,90)" fill="#60a5fa" filter="url(#glow192)">
    <!-- Left prong -->
    <path d="M-38 14 L-38 -18 L-32 -34 L-26 -18 L-26 14 Z"/>
    <!-- Center prong — tallest -->
    <path d="M-9 20 L-9 -30 L0 -46 L9 -30 L9 20 Z"/>
    <!-- Right prong -->
    <path d="M26 14 L26 -18 L32 -34 L38 -18 L38 14 Z"/>
    <!-- Crossbar -->
    <rect x="-38" y="14" width="76" height="8" rx="3"/>
    <!-- Handle shaft -->
    <rect x="-4" y="20" width="8" height="54" rx="4"/>
    <!-- Crossguard -->
    <rect x="-22" y="52" width="44" height="7" rx="3.5"/>
    <circle cx="-22" cy="55.5" r="8"/>
    <circle cx="22"  cy="55.5" r="8"/>
    <!-- Base foot -->
    <rect x="-12" y="74" width="24" height="7" rx="3.5"/>
  </g>
</svg>
